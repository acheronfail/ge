name: GoldenEye 007 (NTSC-U)
sha1: abe01e4aeb033b6c0836819f549c791b26cfde83
options:
  platform: n64
  basename: goldeneye
  target_path: ../baserom.ntsc_u.z64
  build_path: build/ntsc_u/
  base_path: splat.ntsc_u/
  compiler: IDO
  find_file_boundaries: true
  asm_path: asm/
  src_path: src/

segments:
  - name: header
    type: header
    start: 0x0

  - name: boot
    type: bin
    start: 0x40

  - name: main
    type: code
    start: 0x1000
    vram: 0x80000400
    subsegments:
      - [0x1000, asm, entry]
      - [0x1040, asm, game_code]

  - name: assets
    type: bin
    start: 0x3F0000
  - [0xC00000]
